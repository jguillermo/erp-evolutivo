name: Deploy to GitHub Pages

on:
  # Se ejecuta cada vez que haces push a main
  push:
    branches: ["main"]

  # Permite ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Subir los archivos como artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el directorio raíz (donde está index.html)
          path: "."

      # 4. Hacer deploy a GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
