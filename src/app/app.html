<div class="min-h-screen p-4" [class]="darkMode ? 'bg-[#0f1117] text-[#e0e0e0]' : 'light-mode bg-[#f5f5f5] text-[#1a1a2e]'">

  <!-- Header -->
  <header class="mb-4">
    <div class="flex items-start justify-between gap-2">
      <div class="flex-1 text-center px-10 sm:px-0">
        <h1 class="text-2xl font-extrabold mb-1 gradient-text-brand">🌱 ERP Evolutivo, el sistema que evoluciona con tu negocio</h1>
        <p class="text-[0.8rem]" [class.text-[#888]]="darkMode" [class.text-[#666]]="!darkMode">
          Tu ERP crece contigo, solo las herramientas que necesitas, cuando las necesitas
        </p>
      </div>
      <div class="flex gap-1.5 shrink-0">
        <button
          onclick="window.print()"
          class="p-2 rounded-lg border text-sm cursor-pointer transition-all duration-300"
          [class]="darkMode ? 'bg-[#1a1d27] border-[#2a2d3a] text-[#888] hover:border-[#4a4d5a] hover:text-[#ccc]' : 'bg-white border-[#ddd] text-[#555] hover:border-[#999] hover:text-[#222]'"
        >🖨️</button>
        <button
          (click)="toggleTheme()"
          class="p-2 rounded-lg border text-sm cursor-pointer transition-all duration-300"
          [class]="darkMode ? 'bg-[#1a1d27] border-[#2a2d3a] text-[#888] hover:border-[#4a4d5a] hover:text-[#ccc]' : 'bg-white border-[#ddd] text-[#555] hover:border-[#999] hover:text-[#222]'"
        >{{ darkMode ? '☀️' : '🌙' }}</button>
      </div>
    </div>
  </header>

  <!-- Navigation tabs -->
  <nav class="flex justify-center gap-1.5 mb-4 flex-wrap">
    @for (tab of tabs; track tab.route) { @if (tab.visible) {
      <a
        [routerLink]="tab.route"
        routerLinkActive="tab-active"
        [class]="tab.route === '/canvas' ? 'tab-link' : 'tab-btn'"
        [class.tab-btn-light]="!darkMode && tab.route !== '/canvas'"
        [class.tab-link-light]="!darkMode && tab.route === '/canvas'"
      >
        {{ tab.icon }} {{ tab.label }}
      </a>
    } }
  </nav>

  <!-- Page content -->
  <main>
    <router-outlet />
  </main>

</div>
