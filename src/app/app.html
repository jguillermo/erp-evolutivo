<div class="min-h-screen bg-[#0f1117] text-[#e0e0e0] p-4">

  <!-- Header -->
  <header class="mb-4 text-center">
    <h1 class="text-2xl font-extrabold mb-1 gradient-text-brand">🚀 ERP Evolutivo + IA Asesora</h1>
    <p class="text-[#888] text-[0.8rem]">
      Un sistema que crece contigo Y te dice cómo crecer mejor
    </p>
  </header>

  <!-- Navigation tabs -->
  <nav class="flex justify-center gap-1.5 mb-4 flex-wrap">
    @for (tab of tabs; track tab.route) { @if (tab.visible) {
      <a
        [routerLink]="tab.route"
        routerLinkActive="tab-active"
        class="tab-btn"
      >
        {{ tab.icon }} {{ tab.label }}
      </a>
    } }
  </nav>

  <!-- Page content -->
  <main>
    <router-outlet />
  </main>

</div>
