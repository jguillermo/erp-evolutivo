<div class="min-h-screen p-2xl bg-base text-ink">

  <!-- Header -->
  <header class="mb-2xl">
    <div class="flex items-start justify-between gap-lg">
      <div class="flex-1 text-center px-5xl sm:px-0">
        <h1 class="text-2xl font-extrabold mb-sm gradient-text-brand">🌱 ERP Evolutivo, el sistema que evoluciona con tu negocio</h1>
        <p class="text-sm text-ink-subtle">
          Tu ERP crece contigo, solo las herramientas que necesitas, cuando las necesitas
        </p>
      </div>
      <div class="flex gap-md shrink-0">
        <app-button variant="ghost" size="sm" ariaLabel="Imprimir" (clicked)="printPage()">🖨️</app-button>
        <app-button variant="ghost" size="sm" ariaLabel="Cambiar tema" (clicked)="toggleTheme()">{{ darkMode ? '☀️' : '🌙' }}</app-button>
      </div>
    </div>
  </header>

  <!-- Navigation tabs -->
  <nav class="flex justify-center gap-md mb-2xl flex-wrap">
    @for (tab of tabs; track tab.route) { @if (tab.visible) {
      <a
        [routerLink]="tab.route"
        routerLinkActive="tab-active"
        [class]="tab.route === '/canvas' ? 'tab-link' : 'tab-btn'"
      >
        {{ tab.icon }} {{ tab.label }}
      </a>
    } }
  </nav>

  <!-- Page content -->
  <main>
    <router-outlet />
  </main>

</div>
